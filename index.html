<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi primer juego</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a1628;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      padding: 24px 16px;
    }
    h1 {
      color: #ff6b35;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      font-weight: 800;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      text-shadow: 0 0 40px rgba(255,107,53,0.45);
    }
    .hint {
      color: #7b8db0;
      font-size: clamp(0.72rem, 2.2vw, 0.9rem);
      letter-spacing: 0.04em;
      margin-bottom: 20px;
    }
    canvas {
      display: block;
      border-radius: 16px;
      cursor: pointer;
      touch-action: none;
      box-shadow: 0 0 0 2px rgba(255,107,53,0.15), 0 16px 48px rgba(0,0,0,0.7);
      max-width: 100%;
    }
  </style>
</head>
<body>
  <h1>MI PRIMER JUEGO</h1>
  <p class="hint">Toca o presiona espacio para saltar</p>
  <canvas id="c"></canvas>

  <script>
    const cv = document.getElementById('c');
    const ctx = cv.getContext('2d');

    const W = Math.min(640, Math.max(300, window.innerWidth - 32));
    const H = Math.round(W * 0.37);
    cv.width = W; cv.height = H;

    const FLOOR = Math.round(H * 0.74);
    const PW = Math.round(W * 0.05);
    const PH = Math.round(H * 0.44);
    const PX = Math.round(W * 0.14);
    const GRAV = H * 0.0026;
    const JV   = -(H * 0.057);

    const CLOUDS = [
      { rx: 0.12, y: H * 0.1,  w: W * 0.13, h: H * 0.075, spd: 0.14 },
      { rx: 0.42, y: H * 0.06, w: W * 0.09, h: H * 0.055, spd: 0.11 },
      { rx: 0.70, y: H * 0.12, w: W * 0.14, h: H * 0.08,  spd: 0.17 },
      { rx: 0.87, y: H * 0.05, w: W * 0.08, h: H * 0.05,  spd: 0.09 },
    ];

    const HILLS = [
      { cx: W * 0.12, r: H * 0.22 },
      { cx: W * 0.37, r: H * 0.28 },
      { cx: W * 0.61, r: H * 0.24 },
      { cx: W * 0.84, r: H * 0.20 },
    ];

    function rr(x, y, w, h, r) {
      const R = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + R, y);
      ctx.lineTo(x + w - R, y);
      ctx.arcTo(x + w, y, x + w, y + R, R);
      ctx.lineTo(x + w, y + h - R);
      ctx.arcTo(x + w, y + h, x + w - R, y + h, R);
      ctx.lineTo(x + R, y + h);
      ctx.arcTo(x, y + h, x, y + h - R, R);
      ctx.lineTo(x, y + R);
      ctx.arcTo(x, y, x + R, y, R);
      ctx.closePath();
    }

    let score, speed, frame, obs, nextObs, dead, raf;
    const p = { x: PX, y: FLOOR - PH, vy: 0, onGround: true, step: 0, sq: 1 };

    function reset() {
      score = 0; speed = W * 0.0058; frame = 0;
      obs = []; nextObs = 100;
      p.y = FLOOR - PH; p.vy = 0; p.onGround = true; p.step = 0; p.sq = 1;
      dead = false;
      cancelAnimationFrame(raf);
      loop();
    }

    function jump() {
      if (dead) { reset(); return; }
      if (p.onGround) { p.vy = JV; p.onGround = false; }
    }

    window.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); jump(); } });
    cv.addEventListener('pointerdown', e => { e.preventDefault(); jump(); });

    function drawBg() {
      const sky = ctx.createLinearGradient(0, 0, 0, FLOOR);
      sky.addColorStop(0,   '#1256a8');
      sky.addColorStop(0.6, '#3b96e0');
      sky.addColorStop(1,   '#7ec8e8');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, FLOOR);

      ctx.fillStyle = 'rgba(18,86,168,0.22)';
      HILLS.forEach(h => {
        const span = W + h.r * 2;
        const hx = ((h.cx - frame * speed * 0.07) % span + span) % span - h.r;
        ctx.beginPath();
        ctx.arc(hx, FLOOR + 4, h.r, Math.PI, 0);
        ctx.closePath();
        ctx.fill();
      });

      CLOUDS.forEach(c => {
        const span = W + c.w + 30;
        const cx2 = ((c.rx * W - frame * speed * c.spd) % span + span) % span;
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.beginPath();
        ctx.ellipse(cx2, c.y, c.w * 0.5, c.h * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cx2 - c.w * 0.27, c.y + c.h * 0.1, c.w * 0.32, c.h * 0.43, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cx2 + c.w * 0.27, c.y + c.h * 0.12, c.w * 0.3, c.h * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.fillStyle = '#2e7d32';
      ctx.fillRect(0, FLOOR, W, H - FLOOR);
      const gH = Math.round(H * 0.048);
      ctx.fillStyle = '#4caf50';
      ctx.fillRect(0, FLOOR, W, gH);
      ctx.fillStyle = '#66bb6a';
      ctx.fillRect(0, FLOOR, W, Math.round(H * 0.013));

      const dSpan = W + 80;
      const dStep = dSpan / 10;
      ctx.fillStyle = '#388e3c';
      for (let i = 0; i < 12; i++) {
        const lx = W - (frame * speed * 2.2 + i * dStep) % dSpan;
        ctx.fillRect(lx, FLOOR + gH + Math.round(H * 0.04), 18, Math.round(H * 0.017));
      }
    }

    function drawPlayer() {
      const sq = p.sq;
      const rw = PW / sq;
      const rh = PH * sq;
      const sx = p.x + (PW - rw) / 2;
      const sy = p.y + (PH - rh);
      const hR = rh * 0.21;
      const jumping = !p.onGround;
      const sw = jumping ? 0 : Math.sin(p.step) * rh * 0.085;

      ctx.save();

      const lift = (p.y - (FLOOR - PH)) / PH;
      const ss = Math.max(0.3, 1 - lift * 0.7);
      ctx.fillStyle = `rgba(0,0,0,${0.16 * ss})`;
      ctx.beginPath();
      ctx.ellipse(p.x + PW / 2, FLOOR + 3, PW * 0.55 * ss, 3 * ss, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#e53935';
      rr(sx + rw * 0.08, sy + rh * 0.38, rw * 0.84, rh * 0.28, 3);
      ctx.fill();

      ctx.fillStyle = '#ffcc02';
      ctx.beginPath();
      ctx.arc(sx + rw / 2, sy + hR, hR, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.arc(sx + rw * 0.63, sy + hR * 0.88, hR * 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(sx + rw * 0.67, sy + hR * 0.8, hR * 0.08, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#333';
      ctx.lineWidth = Math.max(1, hR * 0.14);
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(sx + rw * 0.54, sy + hR * 0.63);
      ctx.lineTo(sx + rw * 0.74, sy + hR * 0.60);
      ctx.stroke();

      ctx.strokeStyle = '#555';
      ctx.lineWidth = Math.max(1, hR * 0.16);
      ctx.beginPath();
      if (jumping) {
        ctx.arc(sx + rw / 2, sy + hR * 1.28, hR * 0.18, 0, Math.PI * 2);
      } else {
        ctx.arc(sx + rw / 2, sy + hR * 1.3, hR * 0.27, 0.2, Math.PI - 0.2);
      }
      ctx.stroke();

      ctx.fillStyle = '#e53935';
      const aOff = jumping ? -rh * 0.07 : Math.sin(p.step + Math.PI) * rh * 0.07;
      rr(sx - rw * 0.22, sy + rh * 0.41 + aOff, rw * 0.23, rh * 0.23, 3);
      ctx.fill();
      rr(sx + rw * 0.99, sy + rh * 0.41 - aOff, rw * 0.23, rh * 0.23, 3);
      ctx.fill();

      ctx.fillStyle = '#1565c0';
      rr(sx + rw * 0.1,  sy + rh * 0.65 - sw, rw * 0.32, rh * 0.3, 3);
      ctx.fill();
      rr(sx + rw * 0.58, sy + rh * 0.65 + sw, rw * 0.32, rh * 0.3, 3);
      ctx.fill();

      ctx.fillStyle = '#f0f0f0';
      rr(sx + rw * 0.05, sy + rh * 0.9 - sw, rw * 0.38, rh * 0.1, 2);
      ctx.fill();
      rr(sx + rw * 0.53, sy + rh * 0.9 + sw, rw * 0.38, rh * 0.1, 2);
      ctx.fill();

      ctx.restore();
    }

    function drawObs(o) {
      const tw  = o.w * 0.38;
      const tx  = o.x + (o.w - tw) / 2;
      const aY  = o.y + o.h * 0.24;
      const armW = o.w * 0.31;

      ctx.save();

      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.beginPath();
      ctx.ellipse(o.x + o.w / 2, FLOOR + 3, o.w * 0.38, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#2e7d32';
      rr(tx, o.y, tw, o.h, 3);
      ctx.fill();

      rr(o.x, aY, armW + tw * 0.12, o.h * 0.1, 2);
      ctx.fill();
      rr(o.x, aY - o.h * 0.13, tw * 0.62, o.h * 0.15, 2);
      ctx.fill();

      rr(tx + tw * 0.88, aY + o.h * 0.1, armW + tw * 0.12, o.h * 0.1, 2);
      ctx.fill();
      rr(o.x + o.w - tw * 0.62, aY + o.h * 0.1 - o.h * 0.13, tw * 0.62, o.h * 0.15, 2);
      ctx.fill();

      ctx.fillStyle = '#388e3c';
      rr(tx + tw * 0.15, o.y + o.h * 0.06, tw * 0.28, o.h * 0.68, 2);
      ctx.fill();

      ctx.restore();
    }

    function drawHUD() {
      ctx.save();
      ctx.textAlign = 'right';
      ctx.textBaseline = 'top';
      ctx.font = `bold ${Math.round(H * 0.1)}px Segoe UI`;
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillText(`★ ${score}`, W - 13, 13);
      ctx.fillStyle = '#ffffff';
      ctx.fillText(`★ ${score}`, W - 15, 11);
      ctx.restore();
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(10,22,40,0.72)';
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#ff6b35';
      ctx.font = `900 ${Math.round(H * 0.2)}px Segoe UI`;
      ctx.fillText('¡GAME OVER!', W / 2, H * 0.37);
      ctx.fillStyle = '#fff';
      ctx.font = `${Math.round(H * 0.11)}px Segoe UI`;
      ctx.fillText(`Puntuación: ${score}`, W / 2, H * 0.61);
      ctx.fillStyle = '#7b8db0';
      ctx.font = `${Math.round(H * 0.075)}px Segoe UI`;
      ctx.fillText('Toca o presiona espacio para reiniciar', W / 2, H * 0.82);
    }

    function hits(o) {
      const m = PW * 0.13;
      return p.x + m < o.x + o.w && p.x + PW - m > o.x &&
             p.y + m < o.y + o.h && p.y + PH - m > o.y;
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      frame++;

      drawBg();

      const wasOn = p.onGround;
      p.vy += GRAV;
      p.y  += p.vy;

      if (p.y >= FLOOR - PH) {
        p.y = FLOOR - PH;
        if (!wasOn) p.sq = 0.75;
        p.vy = 0; p.onGround = true;
      } else {
        p.onGround = false;
      }

      p.sq += (1 - p.sq) * 0.18;
      if (Math.abs(p.sq - 1) < 0.01) p.sq = 1;
      if (!p.onGround && p.vy < 0) p.sq += (1.11 - p.sq) * 0.1;

      if (p.onGround) p.step += 0.17;

      if (--nextObs <= 0) {
        const oh = H * (0.28 + Math.random() * 0.18);
        obs.push({ x: W + 10, y: FLOOR - oh, w: PW * 1.15, h: oh });
        nextObs = Math.max(52, 100 - score * 0.25) + Math.random() * 45;
      }

      obs = obs.filter(o => o.x + o.w > 0);
      let hit = false;
      obs.forEach(o => { o.x -= speed; drawObs(o); if (hits(o)) hit = true; });

      drawPlayer();
      drawHUD();

      if (frame % 8 === 0) score++;
      if (frame % 360 === 0) speed += W * 0.0008;

      if (hit) dead = true;
      if (dead) { drawGameOver(); return; }
      raf = requestAnimationFrame(loop);
    }

    reset();
  </script>
</body>
</html>
