<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi primer juego</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    #go-overlay {
      display: none; position: fixed; inset: 0; z-index: 10;
      align-items: center; justify-content: center;
    }
    #go-overlay.active { display: flex; }
    #go-box {
      background: rgba(10,22,40,0.96);
      border: 1px solid rgba(255,107,53,0.3);
      border-radius: 18px; padding: 32px 28px; text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.7);
      width: min(360px, calc(100vw - 40px));
    }
    #go-title {
      color: #ff6b35; font-size: clamp(1.3rem,5vw,1.9rem); font-weight: 900;
      letter-spacing: 0.08em; text-shadow: 0 0 30px rgba(255,107,53,0.5);
      margin-bottom: 4px;
    }
    #go-sub { color: #7b8db0; font-size: 0.82rem; letter-spacing: 0.05em; margin-bottom: 8px; }
    #go-score-val { color: #fff; font-size: clamp(2rem,8vw,3rem); font-weight: 800; margin-bottom: 20px; }
    #go-name {
      width: 100%; background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 10px;
      padding: 11px 14px; color: #e2e8f4; font-size: 0.95rem; font-family: inherit;
      outline: none; margin-bottom: 10px; text-align: center;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #go-name::placeholder { color: #3d4f6e; }
    #go-name:focus { border-color: rgba(255,107,53,0.5); box-shadow: 0 0 0 3px rgba(255,107,53,0.12); }
    #go-save {
      width: 100%; background: #ff6b35; color: #fff; border: none;
      border-radius: 10px; padding: 12px; font-size: 0.95rem; font-weight: 700;
      font-family: inherit; letter-spacing: 0.04em; cursor: pointer; margin-bottom: 8px;
      transition: background 0.18s, box-shadow 0.18s, transform 0.12s;
      box-shadow: 0 4px 16px rgba(255,107,53,0.3);
    }
    #go-save:hover { background: #ff7d4d; box-shadow: 0 6px 20px rgba(255,107,53,0.45); }
    #go-save:active { transform: scale(0.97); }
    #go-save:disabled { background: #3d4f6e; box-shadow: none; cursor: default; }
    #go-msg { font-size: 0.82rem; min-height: 20px; margin-bottom: 8px; }
    #go-restart {
      background: none; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px;
      color: #7b8db0; font-family: inherit; font-size: 0.82rem; padding: 8px 20px;
      cursor: pointer; transition: border-color 0.2s, color 0.2s;
    }
    #go-restart:hover { border-color: #ff6b35; color: #ff6b35; }
  </style>
</head>
<body>
  <h1>MI PRIMER JUEGO</h1>
  <p class="hint">Toca o presiona espacio para saltar</p>
  <canvas id="c"></canvas>
  <div id="go-overlay">
    <div id="go-box">
      <div id="go-title">¡GAME OVER!</div>
      <div id="go-sub">PUNTUACIÓN FINAL</div>
      <div id="go-score-val">0</div>
      <input id="go-name" type="text" placeholder="Tu nombre" maxlength="30" autocomplete="off">
      <button id="go-save">Guardar puntaje</button>
      <div id="go-msg"></div>
      <button id="go-restart">Reiniciar (espacio)</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
