<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracker de Puntajes</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a1628;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e2e8f4;
      padding: 40px 16px 60px;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      color: #ff6b35;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: 800;
      letter-spacing: 0.1em;
      text-shadow: 0 0 40px rgba(255,107,53,0.45);
      margin-bottom: 6px;
    }

    header p {
      color: #7b8db0;
      font-size: 0.88rem;
      letter-spacing: 0.04em;
    }

    header a {
      color: #ff6b35;
      text-decoration: none;
      font-size: 0.82rem;
      margin-top: 10px;
      display: inline-block;
      opacity: 0.75;
      transition: opacity 0.2s;
    }

    header a:hover { opacity: 1; }

    /* ── Form card ── */
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,107,53,0.15);
      border-radius: 16px;
      padding: 28px 24px;
      margin-bottom: 32px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.45);
    }

    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 140px;
    }

    label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: #7b8db0;
      text-transform: uppercase;
    }

    input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 11px 14px;
      color: #e2e8f4;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    input::placeholder { color: #3d4f6e; }

    input:focus {
      border-color: rgba(255,107,53,0.5);
      box-shadow: 0 0 0 3px rgba(255,107,53,0.12);
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    .btn-add {
      align-self: flex-end;
      background: #ff6b35;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px 22px;
      font-size: 0.92rem;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.04em;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
      box-shadow: 0 4px 16px rgba(255,107,53,0.3);
      flex-shrink: 0;
    }

    .btn-add:hover {
      background: #ff7d4d;
      box-shadow: 0 6px 20px rgba(255,107,53,0.45);
    }

    .btn-add:active { transform: scale(0.96); }

    .error {
      font-size: 0.8rem;
      color: #ff6b6b;
      margin-top: 10px;
      min-height: 18px;
      letter-spacing: 0.02em;
    }

    /* ── Leaderboard ── */
    .board-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .board-header h2 {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #7b8db0;
      text-transform: uppercase;
    }

    .btn-clear {
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #7b8db0;
      font-family: inherit;
      font-size: 0.75rem;
      padding: 5px 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-clear:hover {
      border-color: #ff6b6b;
      color: #ff6b6b;
    }

    /* ── Table ── */
    .table-wrap {
      overflow-x: auto;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.07);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: rgba(255,107,53,0.08);
    }

    thead th {
      padding: 13px 18px;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #7b8db0;
      text-transform: uppercase;
      white-space: nowrap;
    }

    thead th.right { text-align: right; }

    tbody tr {
      border-top: 1px solid rgba(255,255,255,0.05);
      transition: background 0.15s;
    }

    tbody tr:hover { background: rgba(255,255,255,0.03); }

    tbody td {
      padding: 14px 18px;
      font-size: 0.93rem;
    }

    /* rank badge */
    .rank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      font-size: 0.78rem;
      font-weight: 700;
      background: rgba(255,255,255,0.06);
      color: #7b8db0;
    }

    tr:nth-child(1) .rank { background: rgba(255,185,0,0.18); color: #ffd43b; }
    tr:nth-child(2) .rank { background: rgba(180,180,200,0.18); color: #c0cde6; }
    tr:nth-child(3) .rank { background: rgba(205,127,50,0.18); color: #e0935a; }

    .player-name {
      font-weight: 600;
      color: #e2e8f4;
    }

    .score-cell {
      text-align: right;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #ff6b35;
      font-size: 1rem;
    }

    .btn-del {
      background: none;
      border: none;
      color: #3d4f6e;
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    .btn-del:hover { color: #ff6b6b; background: rgba(255,107,107,0.1); }

    /* empty state */
    .empty {
      text-align: center;
      padding: 48px 24px;
      color: #3d4f6e;
      font-size: 0.9rem;
      letter-spacing: 0.03em;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
    }

    .empty span { font-size: 2rem; display: block; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <h1>TRACKER DE PUNTAJES</h1>
      <p>Registrá y compará los mejores puntajes</p>
      <a href="index.html">← Volver al juego</a>
    </header>

    <!-- Form -->
    <div class="card">
      <div class="form-row">
        <div class="field">
          <label for="inp-name">Jugador</label>
          <input id="inp-name" type="text" placeholder="Nombre del jugador" maxlength="30" autocomplete="off">
        </div>
        <div class="field" style="max-width:160px">
          <label for="inp-score">Puntaje</label>
          <input id="inp-score" type="number" placeholder="0" min="0" max="9999999">
        </div>
        <button class="btn-add" id="btn-add">Agregar</button>
      </div>
      <div class="error" id="error-msg"></div>
    </div>

    <!-- Leaderboard -->
    <div class="board-header">
      <h2>Clasificación</h2>
      <button class="btn-clear" id="btn-clear">Borrar todo</button>
    </div>

    <div id="board"></div>

  </div>

  <script>
    const STORAGE_KEY = 'tracker_scores_v1';

    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function save(scores) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(scores));
    }

    function render() {
      const scores = load().sort((a, b) => b.score - a.score);
      const board = document.getElementById('board');

      if (scores.length === 0) {
        board.innerHTML = '<div class="empty"><span>🏆</span>Aún no hay puntajes.<br>¡Agregá el primero!</div>';
        return;
      }

      const rows = scores.map((entry, i) => `
        <tr>
          <td><span class="rank">${i + 1}</span></td>
          <td><span class="player-name">${esc(entry.name)}</span></td>
          <td class="score-cell">${entry.score.toLocaleString('es-MX')}</td>
          <td>
            <button class="btn-del" data-id="${entry.id}" title="Eliminar">✕</button>
          </td>
        </tr>
      `).join('');

      board.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:44px">#</th>
                <th>Jugador</th>
                <th class="right">Puntaje</th>
                <th style="width:44px"></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;

      board.querySelectorAll('.btn-del').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          save(load().filter(e => e.id !== id));
          render();
        });
      });
    }

    function esc(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addEntry() {
      const nameEl  = document.getElementById('inp-name');
      const scoreEl = document.getElementById('inp-score');
      const errorEl = document.getElementById('error-msg');

      const name  = nameEl.value.trim();
      const score = parseInt(scoreEl.value, 10);

      if (!name) {
        errorEl.textContent = 'Ingresá el nombre del jugador.';
        nameEl.focus();
        return;
      }
      if (scoreEl.value === '' || isNaN(score) || score < 0) {
        errorEl.textContent = 'Ingresá un puntaje válido (número ≥ 0).';
        scoreEl.focus();
        return;
      }

      errorEl.textContent = '';

      const scores = load();
      scores.push({ id: Math.random().toString(36).slice(2), name, score });
      save(scores);
      render();

      nameEl.value  = '';
      scoreEl.value = '';
      nameEl.focus();
    }

    document.getElementById('btn-add').addEventListener('click', addEntry);

    document.getElementById('inp-score').addEventListener('keydown', e => {
      if (e.key === 'Enter') addEntry();
    });

    document.getElementById('inp-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('inp-score').focus();
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      if (confirm('¿Borrar todos los puntajes?')) {
        save([]);
        render();
      }
    });

    render();
  </script>
</body>
</html>
